name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight CI on the same branch when a new push supersedes it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source checkout
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Rust toolchain (stable pinned to the project's MSRV floor)
      # ------------------------------------------------------------------ #
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.83.0
        with:
          toolchain: 1.83.0
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ------------------------------------------------------------------ #
      # 3. Node + pnpm (pnpm via corepack to stay aligned with engines.pnpm)
      # ------------------------------------------------------------------ #
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ------------------------------------------------------------------ #
      # 4. Linux-only: native deps Tauri needs to compile (webkit2gtk etc.)
      # ------------------------------------------------------------------ #
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ------------------------------------------------------------------ #
      # 5. Frontend install (locked)
      # ------------------------------------------------------------------ #
      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ------------------------------------------------------------------ #
      # 6. Rust quality gates
      # ------------------------------------------------------------------ #
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all

      # ------------------------------------------------------------------ #
      # 7. Type-gen smoke — verify offline TS fallbacks match Rust shapes
      # ------------------------------------------------------------------ #
      - name: gen-types (dry-run, offline)
        shell: bash
        run: ./scripts/gen-types.sh --check

      # ------------------------------------------------------------------ #
      # 8. Frontend quality gates
      # ------------------------------------------------------------------ #
      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

      # ------------------------------------------------------------------ #
      # 9. Tauri compile smoke (no bundling — keeps CI fast and unsigned)
      # ------------------------------------------------------------------ #
      - name: tauri build (bundles none, smoke)
        run: pnpm tauri build --bundles none
